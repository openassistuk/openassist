name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: CodeQL preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain CodeQL mode
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ vars.OPENASSIST_ENABLE_PRIVATE_CODEQL }}" != "true" ]; then
            echo "CodeQL is skipped for private repositories unless OPENASSIST_ENABLE_PRIVATE_CODEQL=true."
            echo "Set OPENASSIST_ENABLE_PRIVATE_CODEQL=true to force private-repo runs."
          else
            echo "CodeQL analysis is enabled for this repository context."
          fi

  analyze:
    name: analyze (javascript-typescript)
    needs: preflight
    if: ${{ github.event.repository.private == false || vars.OPENASSIST_ENABLE_PRIVATE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
