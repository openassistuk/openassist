name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: CodeQL preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.mode.outputs.should_run }}
    steps:
      - name: Determine CodeQL mode
        id: mode
        env:
          OPENASSIST_ENABLE_PRIVATE_CODEQL: ${{ vars.OPENASSIST_ENABLE_PRIVATE_CODEQL }}
          OPENASSIST_REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ "$OPENASSIST_REPOSITORY_PRIVATE" = "true" ] && [ "$OPENASSIST_ENABLE_PRIVATE_CODEQL" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain CodeQL mode
        env:
          OPENASSIST_ENABLE_PRIVATE_CODEQL: ${{ vars.OPENASSIST_ENABLE_PRIVATE_CODEQL }}
          OPENASSIST_REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ "$OPENASSIST_REPOSITORY_PRIVATE" = "true" ] && [ "$OPENASSIST_ENABLE_PRIVATE_CODEQL" != "true" ]; then
            echo "CodeQL is skipped for private repositories unless OPENASSIST_ENABLE_PRIVATE_CODEQL=true."
            echo "Set OPENASSIST_ENABLE_PRIVATE_CODEQL=true to force private-repo runs."
          else
            echo "CodeQL analysis is enabled for this repository context."
          fi

  analyze:
    name: analyze (javascript-typescript)
    needs: preflight
    if: ${{ needs.preflight.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.31.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
