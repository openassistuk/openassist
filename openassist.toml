[runtime]
bindAddress = "127.0.0.1"
bindPort = 3344
defaultProviderId = "openai-main"
defaultPolicyProfile = "operator"

[runtime.assistant]
name = "OpenAssist"
persona = "Pragmatic, concise, and execution-focused local AI assistant."
operatorPreferences = ""
promptOnFirstContact = true

[runtime.time]
ntpPolicy = "warn-degrade"
ntpCheckIntervalSec = 300
ntpMaxSkewMs = 10000
ntpHttpSources = [
  "https://www.google.com",
  "https://www.cloudflare.com",
  "https://www.microsoft.com",
]
requireTimezoneConfirmation = true

[runtime.scheduler]
enabled = true
tickIntervalMs = 1000
heartbeatIntervalSec = 30
defaultMisfirePolicy = "catch-up-once"
tasks = []

[runtime.paths]
dataDir = ".openassist/data"
skillsDir = ".openassist/skills"
logsDir = ".openassist/logs"

[[runtime.providers]]
id = "openai-main"
type = "openai"
defaultModel = "gpt-5.2"

# Example OAuth configuration (official provider-documented flows only):
# [runtime.providers.oauth]
# authorizeUrl = "https://provider.example.com/oauth/authorize"
# tokenUrl = "https://provider.example.com/oauth/token"
# clientId = "your-client-id"
# clientSecretEnv = "OPENASSIST_OPENAI_OAUTH_CLIENT_SECRET"
# scopes = ["openid", "profile"]

