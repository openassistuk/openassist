# Example scheduled skill task (every hour interval):
# [[runtime.scheduler.tasks]]
# id = "skill-audit"
# enabled = true
# scheduleKind = "interval"
# intervalSec = 3600
# misfirePolicy = "backfill"
#
# [runtime.scheduler.tasks.action]
# type = "skill"
# skillId = "shell-audit"
# entrypoint = "scripts/summarize.mjs"

[tools.fs]
workspaceOnly = true
allowedReadPaths = []
allowedWritePaths = []

[tools.exec]
defaultTimeoutMs = 60000

[tools.exec.guardrails]
mode = "minimal"
extraBlockedPatterns = []

[tools.pkg]
enabled = true
preferStructuredInstall = true
allowExecFallback = true
sudoNonInteractive = true
allowedManagers = []

[tools.web]
enabled = true
searchMode = "hybrid"
requestTimeoutMs = 15000
maxRedirects = 5
maxFetchBytes = 1000000
maxSearchResults = 8
maxPagesPerRun = 4

[security]
auditLogEnabled = true
secretsBackend = "encrypted-file"
