# responseMode = "inline" # "inline" or "reply-threaded"

# Example scheduled prompt task (every 15 minutes):
# [[runtime.scheduler.tasks]]
# id = "summary-job"
# enabled = true
# scheduleKind = "cron"
# cron = "0 */15 * * * *"
# timezone = "America/New_York"
